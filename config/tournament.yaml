# =============================================================================
# TOURNAMENT STRATEGY  --  maximum-variance "go big or go home" playbook.
# =============================================================================
# Objective is NOT total return; it is P(finishing #1 of N). Contest theory
# (Gaba-Tsetlin-Winkler 2004; Hvide 2002; Dubins-Savage bold play) => maximize
# variance & right-skew, minimize correlation to the field, concentrate.
# -----------------------------------------------------------------------------

field:
  n_players: 76                 # winner-take-all field size
  contest_length_days: 42       # ~2 trading months
  window_step_days: 5           # stride between simulated contests in the backtest
  # How rivals are modeled. They are assumed crowded into a lower-variance,
  # higher-correlation beta book (the herd we must out-tail).
  rival_universe: largecap      # largecap | liquid | all
  rival_universe_size: 500      # names rivals draw from
  rival_names_per_book: 20      # concentration of a typical rival
  rival_gross_leverage: 2.0
  field_samples: 3000           # MC rival portfolios per window (for P(win))

construction:
  n_names: 20                   # 20 @ 10% cap => full 2x gross; fewer => higher idio
  corr_threshold: 0.5           # reject candidates too correlated with current picks
  corr_lookback: 63
  weighting: equal              # equal | score
  long_only: true               # convex payoff, truncated downside (no naked shorts)
  target_gross_leverage: 2.0
  min_price: 1.0
  rebalance: weekly

# Lottery signals blended into the selection score.
signals:
  max_lottery:                  # Bali-Cakici-Whitelaw MAX (primary)
    enabled: true
    blend_weight: 0.30
    params: {window: 21, top_k: 1}
  ivol:                         # idiosyncratic volatility
    enabled: true
    blend_weight: 0.25
    params: {window: 21}
  idio_skew:                    # positive idiosyncratic skew (right tail)
    enabled: true
    blend_weight: 0.15
    params: {window: 42}
  low_price:                    # cheap, lottery-like names
    enabled: true
    blend_weight: 0.10
    params: {price_ceiling: 0}
  recent_ipo:                   # fat early-life tails
    enabled: true
    blend_weight: 0.05
    params: {max_age_days: 252}
  biotech:                      # binary-catalyst sector tilt
    enabled: true
    blend_weight: 0.10
    params: {}
  short_squeeze:                # squeeze fuel (0 if SI data absent)
    enabled: true
    blend_weight: 0.05
    params: {}
