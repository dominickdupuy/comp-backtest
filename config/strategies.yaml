# =============================================================================
# STRATEGY BOOK  --  the blended alpha engine.
# =============================================================================
# A weighted blend of delay-robust, cost-sensitive equity anomalies. Each
# signal produces a cross-sectional score; the portfolio constructor turns the
# blended score into long/short target weights, then the engine applies the
# competition constraints from competition.yaml.
# -----------------------------------------------------------------------------

# --- Backtest window ---------------------------------------------------------
backtest:
  lookback_years: 3
  start_date: null                 # "2023-06-17" overrides lookback_years
  end_date: null                   # null => today
  rebalance: daily                 # daily | weekly | <int> calendar days
  tournament_mode: false           # true => reset PnL every contest_length_days

# --- Portfolio construction --------------------------------------------------
construction:
  long_short: true
  long_quantile: 0.10              # long top decile of blended score
  short_quantile: 0.10             # short bottom decile
  dollar_neutral: true             # equal gross long vs short
  weighting: score                 # score | equal  (within each leg)
  target_gross_leverage: 2.0       # push to the 2x cap (super-Kelly posture)
  # Sizing posture for a rank-based sprint: concentrate, over-bet.
  sizing:
    method: kelly_scaled           # kelly_scaled | equal_risk | fixed
    kelly_multiple: 2.0            # super-Kelly (>1) per tournament theory
    max_names_per_leg: 30          # concentrate into highest-conviction names
    escalate_when_behind: true     # ramp concentration in final weeks (tourn. mode)

# --- Signals (enable/disable + blend weight + params) ------------------------
# blend_weight is the relative contribution to the combined cross-sectional
# z-score. Weights are normalized internally.
signals:
  pead:                            # PRIMARY: post-earnings announcement drift
    enabled: true
    blend_weight: 0.35
    params:
      hold_days: 30                # 5-60 day drift window
      surprise_field: sue          # sue | ear_proxy (earnings-day abn. return)
      smallcap_tilt: true          # overweight small/microcap where drift is larger

  xs_momentum:                     # cross-sectional relative momentum
    enabled: true
    blend_weight: 0.20
    params:
      formation_months: 6          # 6-month formation (crash-aware)
      skip_days: 21                # skip most recent month (reversal)
      long_bias: true              # trim short leg to avoid momentum crashes

  reversal:                        # short-term residual mean-reversion / stat-arb
    enabled: true
    blend_weight: 0.25
    params:
      lookback_days: 5             # multi-day, NOT intraday (delay-safe)
      neutralize: sector           # none | sector | beta

  ts_momentum:                     # time-series trend
    enabled: false
    blend_weight: 0.10
    params:
      lookback_months: 12

  overnight:                       # buy-at-close / sell-at-open overlay
    enabled: true
    blend_weight: 0.20
    params:
      lookback_days: 21            # rank by trailing overnight return

  bab:                             # betting-against-beta base layer
    enabled: false
    blend_weight: 0.10
    params:
      beta_window_days: 252
